<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Troskovi</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0D0F0E; --surface:#141714; --card:#1A1D1A;
  --border:#2A2E2A; --border2:#363B36;
  --text:#E8EDE8; --muted:#6B746B;
  --accent:#B8F458; --accent2:#7EC832;
  --red:#FF5C5C; --orange:#FF9F43;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;font-size:14px;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 18px 12px;position:sticky;top:0;z-index:100;}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.app-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
.month-label{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--text);line-height:1;}
.header-right{text-align:right;}
.total-label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;}
.total-amount{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--accent);}
.month-nav{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.month-nav::-webkit-scrollbar{display:none;}
.month-tab{flex-shrink:0;background:none;border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;padding:5px 10px;border-radius:2px;cursor:pointer;}
.month-tab.active{background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:500;}
.form-panel{background:var(--card);border-bottom:1px solid var(--border);padding:16px 18px;}
.amount-row{display:flex;align-items:center;margin-bottom:12px;border:1px solid var(--border2);border-radius:3px;overflow:hidden;background:var(--surface);}
.currency-prefix{padding:0 12px;font-family:'Syne',sans-serif;font-weight:700;font-size:18px;color:var(--accent);border-right:1px solid var(--border2);height:52px;display:flex;align-items:center;}
#inp-amount{flex:1;background:none;border:none;outline:none;font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--text);padding:0 14px;height:52px;}
#inp-amount::placeholder{color:var(--border2);}
.cat-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.cat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px;}
.cat-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;padding:7px 4px 6px;border-radius:3px;cursor:pointer;text-align:center;line-height:1.3;}
.cat-icon{font-size:16px;display:block;margin-bottom:3px;}
.cat-name{display:block;font-size:9px;}
.cat-btn.selected{background:var(--accent);border-color:var(--accent);color:var(--bg);}
.cat-btn:active{opacity:0.7;}
.desc-row{margin-bottom:12px;}
#inp-desc{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:3px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:10px 12px;outline:none;}
#inp-desc::placeholder{color:var(--muted);font-style:italic;}
.date-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px;}
.date-picker-wrap{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border2);border-radius:3px;padding:7px 12px;flex:1;}
.date-lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);flex-shrink:0;}
#inp-date{background:none;border:none;outline:none;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--accent);flex:1;color-scheme:dark;}
.btn-summary{background:none;border:1px solid var(--border2);color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;padding:5px 10px;border-radius:2px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
#btn-add{width:100%;background:var(--accent);border:none;color:var(--bg);font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;padding:14px;border-radius:3px;cursor:pointer;text-transform:uppercase;}
#btn-add:active{background:var(--accent2);}
.report-wrap{padding:12px 18px;}
#btn-report{width:100%;background:transparent;border:1.5px solid var(--accent);color:var(--accent);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;padding:12px;border-radius:3px;cursor:pointer;text-transform:uppercase;}
#btn-report:active{background:var(--accent);color:var(--bg);}
#btn-report:disabled{opacity:0.4;cursor:not-allowed;}
.stats-bar{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.stats-bar::-webkit-scrollbar{display:none;}
.stat-cell{flex:1;min-width:80px;padding:10px 12px;border-right:1px solid var(--border);text-align:center;}
.stat-cell:last-child{border-right:none;}
.stat-icon{font-size:14px;display:block;margin-bottom:3px;}
.stat-cat{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.stat-val{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--accent);margin-top:2px;}
main{max-width:480px;margin:0 auto;padding:0 0 80px;}
.day-header{display:flex;justify-content:space-between;align-items:center;padding:8px 18px 6px;background:var(--bg);border-bottom:1px solid var(--border);}
.day-name{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.day-total{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--orange);}
.entry-row{display:flex;align-items:center;padding:11px 18px;border-bottom:1px solid var(--border);gap:12px;}
.entry-cat-icon{font-size:20px;width:30px;text-align:center;flex-shrink:0;}
.entry-info{flex:1;min-width:0;}
.entry-cat-name{font-size:11px;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:1px;}
.entry-desc{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.entry-time{font-size:10px;color:var(--border2);margin-top:1px;}
.entry-amount{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--red);flex-shrink:0;}
.entry-del{background:none;border:none;color:var(--border2);font-size:18px;cursor:pointer;padding:4px;flex-shrink:0;}
.entry-del:active{color:var(--red);}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:36px;display:block;margin-bottom:12px;opacity:0.4;}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:var(--bg);font-family:'Syne',sans-serif;font-weight:700;font-size:13px;padding:10px 20px;border-radius:3px;opacity:0;transition:all 0.25s;pointer-events:none;z-index:999;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#summary-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;align-items:flex-end;justify-content:center;}
#summary-modal.open{display:flex;}
.modal-sheet{background:var(--card);border:1px solid var(--border2);border-radius:8px 8px 0 0;width:100%;max-width:480px;padding:20px 20px 40px;animation:slideUp 0.25s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--text);margin-bottom:16px;display:flex;justify-content:space-between;}
.modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.summary-row:last-child{border-bottom:none;}
.summary-left{display:flex;align-items:center;gap:10px;}
.summary-icon{font-size:18px;}
.summary-name{font-size:13px;color:var(--text);}
.summary-pct{font-size:10px;color:var(--muted);}
.summary-bar-wrap{flex:1;margin:0 12px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.summary-bar{height:100%;background:var(--accent);border-radius:2px;}
.summary-amount{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--orange);white-space:nowrap;}
#report-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:600;align-items:flex-end;justify-content:center;}
#report-modal.open{display:flex;}
.report-sheet{background:var(--card);border:1px solid var(--border2);border-top:2px solid var(--accent);border-radius:8px 8px 0 0;width:100%;max-width:480px;height:85vh;display:flex;flex-direction:column;animation:slideUp 0.28s ease;}
.report-header{display:flex;justify-content:space-between;align-items:center;padding:18px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.report-label{font-size:9px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:3px;}
.report-month-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--text);}
#report-body{flex:1;overflow-y:auto;padding:20px;}
.report-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:18px;}
.loader{width:36px;height:36px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--muted);font-style:italic;}
.report-section{margin-bottom:22px;}
.report-section-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.report-stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.report-stat-row:last-child{border-bottom:none;}
.report-stat-label{color:var(--muted);}
.report-stat-val{font-family:'Syne',sans-serif;font-weight:700;color:var(--orange);}
.report-text{font-family:'DM Mono',monospace;font-size:13px;line-height:1.75;color:var(--text);}
.report-text div{margin-bottom:6px;}
.report-advice-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.6;}
.report-advice-item:last-child{border-bottom:none;}
.advice-num{font-family:'Syne',sans-serif;font-weight:800;color:var(--accent);font-size:15px;flex-shrink:0;width:20px;}
.advice-text{color:var(--text);}
.report-error{color:var(--red);font-size:13px;text-align:center;padding:30px 10px;line-height:1.6;}
</style>
</head>
<body>
<div id="pin-overlay" style="display:flex;position:fixed;inset:0;background:#1A1A2E;z-index:99999;flex-direction:column;align-items:center;justify-content:center;gap:20px;font-family:sans-serif;">
  <div style="color:#C9A96E;font-size:13px;letter-spacing:3px;text-transform:uppercase;">Unesi PIN</div>
  <div id="pin-dots" style="display:flex;gap:12px;margin:8px 0;">
    <div id="d1" style="width:14px;height:14px;border-radius:50%;border:2px solid #C9A96E;"></div>
    <div id="d2" style="width:14px;height:14px;border-radius:50%;border:2px solid #C9A96E;"></div>
    <div id="d3" style="width:14px;height:14px;border-radius:50%;border:2px solid #C9A96E;"></div>
    <div id="d4" style="width:14px;height:14px;border-radius:50%;border:2px solid #C9A96E;"></div>
  </div>
  <div id="pin-error" style="color:#FF5C5C;font-size:12px;height:16px;"></div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:220px;">
    <button onclick="pinPress('1')" style="height:60px;background:#16213E;border:1px solid #2A2E4A;color:#E8EDE8;font-size:22px;border-radius:4px;cursor:pointer;">1</button>
    <button onclick="pinPress('2')" style="height:60px;background:#16213E;border:1px solid #2A2E4A;color:#E8EDE8;font-size:22px;border-radius:4px;cursor:pointer;">2</button>
    <button onclick="pinPress('3')" style="height:60px;background:#16213E;border:1px solid #2A2E4A;color:#E8EDE8;font-size:22px;border-radius:4px;cursor:pointer;">3</button>
    <button onclick="pinPress('4')" style="height:60px;background:#16213E;border:1px solid #2A2E4A;color:#E8EDE8;font-size:22px;border-radius:4px;cursor:pointer;">4</button>
    <button onclick="pinPress('5')" style="height:60px;background:#16213E;border:1px solid #2A2E4A;color:#E8EDE8;font-size:22px;border-radius:4px;cursor:pointer;">5</button>
    <button onclick="pinPress('6')" style="height:60px;background:#16213E;border:1px solid #2A2E4A;color:#E8EDE8;font-size:22px;border-radius:4px;cursor:pointer;">6</button>
    <button onclick="pinPress('7')" style="height:60px;background:#16213E;border:1px solid #2A2E4A;color:#E8EDE8;font-size:22px;border-radius:4px;cursor:pointer;">7</button>
    <button onclick="pinPress('8')" style="height:60px;background:#16213E;border:1px solid #2A2E4A;color:#E8EDE8;font-size:22px;border-radius:4px;cursor:pointer;">8</button>
    <button onclick="pinPress('9')" style="height:60px;background:#16213E;border:1px solid #2A2E4A;color:#E8EDE8;font-size:22px;border-radius:4px;cursor:pointer;">9</button>
    <button onclick="pinDel()" style="height:60px;background:#16213E;border:1px solid #2A2E4A;color:#FF5C5C;font-size:18px;border-radius:4px;cursor:pointer;">⌫</button>
    <button onclick="pinPress('0')" style="height:60px;background:#16213E;border:1px solid #2A2E4A;color:#E8EDE8;font-size:22px;border-radius:4px;cursor:pointer;">0</button>
    <div></div>
  </div>
</div>
<script>
var _pin = '';
var _correct = '1312';
var _sk = 'pin_ok_' + location.pathname;
if(sessionStorage.getItem(_sk)==='1'){
  document.getElementById('pin-overlay').style.display='none';
}
function pinPress(d){
  if(_pin.length>=4)return;
  _pin+=d;
  document.getElementById('d'+_pin.length).style.background='#C9A96E';
  if(_pin.length===4){
    if(_pin===_correct){
      sessionStorage.setItem(_sk,'1');
      document.getElementById('pin-overlay').style.display='none';
    } else {
      document.getElementById('pin-error').textContent='Pogresan PIN';
      setTimeout(function(){
        _pin='';
        for(var i=1;i<=4;i++)document.getElementById('d'+i).style.background='transparent';
        document.getElementById('pin-error').textContent='';
      },800);
    }
  }
}
function pinDel(){
  if(!_pin.length)return;
  document.getElementById('d'+_pin.length).style.background='transparent';
  _pin=_pin.slice(0,-1);
}
</script>

<header>
  <div class="header-top">
    <div>
      <div class="app-title">Troskovi</div>
      <div class="month-label" id="header-month">-</div>
    </div>
    <div class="header-right">
      <div class="total-label">Ukupno ovaj mj.</div>
      <div class="total-amount">KM <span id="header-total">0,00</span></div>
    </div>
  </div>
  <div class="month-nav" id="month-nav"></div>
</header>

<div class="form-panel">
  <div class="amount-row">
    <div class="currency-prefix">KM</div>
    <input id="inp-amount" type="number" inputmode="decimal" placeholder="0,00" step="0.01" min="0">
  </div>
  <div class="cat-label">Kategorija</div>
  <div class="cat-grid" id="cat-grid"></div>
  <div class="desc-row">
    <input id="inp-desc" type="text" placeholder="Opis (opciono)..." maxlength="60">
  </div>
  <div class="date-row">
    <div class="date-picker-wrap">
      <span class="date-lbl">Datum</span>
      <input id="inp-date" type="date">
    </div>
    <button class="btn-summary" id="btn-open-summary">Po kategoriji</button>
  </div>
  <button id="btn-add">+ Dodaj trosak</button>
</div>

<div class="report-wrap">
  <button id="btn-report">Generisi mjesecni AI izvjestaj</button>
</div>

<div class="stats-bar" id="stats-bar"></div>

<main><div id="ledger"></div></main>

<div id="toast"></div>

<div id="summary-modal">
  <div class="modal-sheet">
    <div class="modal-title">
      <span>Pregled po kategoriji</span>
      <button class="modal-close" id="btn-close-summary">x</button>
    </div>
    <div id="summary-content"></div>
  </div>
</div>

<div id="report-modal">
  <div class="report-sheet">
    <div class="report-header">
      <div>
        <div class="report-label">AI Analiza</div>
        <div class="report-month-title" id="report-month-title">-</div>
      </div>
      <button class="modal-close" id="btn-close-report">x</button>
    </div>
    <div id="report-body">
      <div class="report-loading" id="report-loading">
        <div class="loader"></div>
        <div class="loading-text">Analiziram tvoje troskove...</div>
      </div>
      <div id="report-content" style="display:none"></div>
    </div>
  </div>
</div>

<script>
var STORE = 'troskovi_v1';
var CATS = [
  {id:'hrana',    icon:'🥗', name:'Hrana'},
  {id:'pice',     icon:'☕', name:'Pice'},
  {id:'prevoz',   icon:'🚗', name:'Prevoz'},
  {id:'stan',     icon:'🏠', name:'Stan'},
  {id:'odijelo',  icon:'👕', name:'Odjeca'},
  {id:'sport',    icon:'🏋', name:'Sport'},
  {id:'knjige',   icon:'📚', name:'Knjige'},
  {id:'zdravlje', icon:'💊', name:'Zdravlje'},
  {id:'zabava',   icon:'🎮', name:'Zabava'},
  {id:'ostalo',   icon:'📦', name:'Ostalo'}
];
var SR_MONTHS = ['Januar','Februar','Mart','April','Maj','Jun','Jul','Avgust','Septembar','Oktobar','Novembar','Decembar'];
var SR_DAYS   = ['Ned','Pon','Uto','Sri','Cet','Pet','Sub'];
var selectedCat = null;
var viewYear  = new Date().getFullYear();
var viewMonth = new Date().getMonth();

function loadData(){try{return JSON.parse(localStorage.getItem(STORE)||'[]');}catch(e){return[];}}
function saveData(d){localStorage.setItem(STORE,JSON.stringify(d));}
function fmt(n){return Number(n).toFixed(2).replace('.',',');}

function buildCatGrid(){
  var grid = document.getElementById('cat-grid');
  CATS.forEach(function(cat){
    var btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.innerHTML = '<span class="cat-icon">'+cat.icon+'</span><span class="cat-name">'+cat.name+'</span>';
    btn.onclick = function(){
      selectedCat = cat.id;
      document.querySelectorAll('.cat-btn').forEach(function(b){b.classList.remove('selected');});
      btn.classList.add('selected');
    };
    grid.appendChild(btn);
  });
}

function buildMonthNav(){
  var nav = document.getElementById('month-nav');
  nav.innerHTML = '';
  var now = new Date();
  for(var i=5;i>=0;i--){
    (function(){
      var d = new Date(now.getFullYear(), now.getMonth()-i, 1);
      var y = d.getFullYear(), m = d.getMonth();
      var btn = document.createElement('button');
      btn.className = 'month-tab'+(y===viewYear&&m===viewMonth?' active':'');
      btn.textContent = SR_MONTHS[m].substring(0,3)+(y!==now.getFullYear()?" '"+String(y).slice(2):'');
      btn.onclick = function(){viewYear=y;viewMonth=m;buildMonthNav();render();};
      nav.appendChild(btn);
    })();
  }
  nav.scrollLeft = nav.scrollWidth;
}

function setTodayDate(){
  var now=new Date();
  var s=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  document.getElementById('inp-date').value=s;
  document.getElementById('inp-date').max=s;
}

document.getElementById('btn-add').onclick = function(){
  var amtRaw = parseFloat(document.getElementById('inp-amount').value);
  if(!amtRaw||amtRaw<=0){showToast('Unesi iznos!');return;}
  if(!selectedCat){showToast('Odaberi kategoriju!');return;}
  var now = new Date();
  var chosenDate = document.getElementById('inp-date').value || now.toISOString().split('T')[0];
  var isToday = chosenDate===now.toISOString().split('T')[0];
  var entry = {
    id:Date.now(), amt:Math.round(amtRaw*100)/100, cat:selectedCat,
    desc:document.getElementById('inp-desc').value.trim(), date:chosenDate,
    time:isToday?String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0'):''
  };
  var data=loadData(); data.unshift(entry); saveData(data);
  document.getElementById('inp-amount').value='';
  document.getElementById('inp-desc').value='';
  selectedCat=null;
  document.querySelectorAll('.cat-btn').forEach(function(b){b.classList.remove('selected');});
  setTodayDate();
  var d2=new Date(chosenDate+'T00:00:00'); viewYear=d2.getFullYear(); viewMonth=d2.getMonth();
  buildMonthNav(); render(); showToast('Dodano');
};

function deleteEntry(id){
  if(!confirm('Obrisati?'))return;
  saveData(loadData().filter(function(e){return e.id!==id;}));
  render();
}

function render(){
  var all=loadData();
  var data=all.filter(function(e){
    var d=new Date(e.date+'T00:00:00');
    return d.getFullYear()===viewYear&&d.getMonth()===viewMonth;
  });
  document.getElementById('header-month').textContent=SR_MONTHS[viewMonth];
  var total=data.reduce(function(s,e){return s+e.amt;},0);
  document.getElementById('header-total').textContent=fmt(total);
  renderStats(data); renderLedger(data); renderSummaryContent(data,total);
}

function renderStats(data){
  var bar=document.getElementById('stats-bar'); bar.innerHTML='';
  if(!data.length)return;
  var bycat={};
  data.forEach(function(e){bycat[e.cat]=(bycat[e.cat]||0)+e.amt;});
  Object.entries(bycat).sort(function(a,b){return b[1]-a[1];}).slice(0,5).forEach(function(pair){
    var cat=CATS.find(function(c){return c.id===pair[0];});
    if(!cat)return;
    var cell=document.createElement('div'); cell.className='stat-cell';
    cell.innerHTML='<span class="stat-icon">'+cat.icon+'</span><span class="stat-cat">'+cat.name+'</span><div class="stat-val">KM '+fmt(pair[1])+'</div>';
    bar.appendChild(cell);
  });
}

function renderLedger(data){
  var ledger=document.getElementById('ledger'); ledger.innerHTML='';
  if(!data.length){
    ledger.innerHTML='<div class="empty-state"><span class="empty-icon">📋</span><div>Nema troskova za '+SR_MONTHS[viewMonth]+'.</div></div>';
    return;
  }
  var groups={};
  data.forEach(function(e){if(!groups[e.date])groups[e.date]=[];groups[e.date].push(e);});
  var today=new Date(); today.setHours(0,0,0,0);
  Object.keys(groups).sort(function(a,b){return b.localeCompare(a);}).forEach(function(ds){
    var entries=groups[ds], d=new Date(ds+'T00:00:00');
    var dayTotal=entries.reduce(function(s,e){return s+e.amt;},0);
    var isToday=d.getTime()===today.getTime();
    var hdr=document.createElement('div'); hdr.className='day-header';
    hdr.innerHTML='<span class="day-name">'+(isToday?'Danas':SR_DAYS[d.getDay()]+', '+d.getDate()+'.'+(d.getMonth()+1)+'.')+'</span><span class="day-total">KM '+fmt(dayTotal)+'</span>';
    ledger.appendChild(hdr);
    entries.forEach(function(e){
      var cat=CATS.find(function(c){return c.id===e.cat;})||{icon:'📦',name:'Ostalo'};
      var row=document.createElement('div'); row.className='entry-row';
      row.innerHTML='<span class="entry-cat-icon">'+cat.icon+'</span><div class="entry-info"><div class="entry-cat-name">'+cat.name+'</div><div class="entry-desc">'+(e.desc||'-')+'</div><div class="entry-time">'+(e.time||'')+'</div></div><span class="entry-amount">-'+fmt(e.amt)+'</span><button class="entry-del" data-id="'+e.id+'">x</button>';
      row.querySelector('.entry-del').onclick=function(){deleteEntry(e.id);};
      ledger.appendChild(row);
    });
  });
}

function renderSummaryContent(data,total){
  var cont=document.getElementById('summary-content'); cont.innerHTML='';
  var bycat={};
  data.forEach(function(e){bycat[e.cat]=(bycat[e.cat]||0)+e.amt;});
  var sorted=Object.entries(bycat).sort(function(a,b){return b[1]-a[1];});
  if(!sorted.length){cont.innerHTML='<div style="color:var(--muted);text-align:center;padding:20px">Nema podataka</div>';return;}
  sorted.forEach(function(pair){
    var cat=CATS.find(function(c){return c.id===pair[0];})||{icon:'📦',name:pair[0]};
    var pct=total>0?Math.round(pair[1]/total*100):0;
    var row=document.createElement('div'); row.className='summary-row';
    row.innerHTML='<div class="summary-left"><span class="summary-icon">'+cat.icon+'</span><div><div class="summary-name">'+cat.name+'</div><div class="summary-pct">'+pct+'%</div></div></div><div class="summary-bar-wrap"><div class="summary-bar" style="width:'+pct+'%"></div></div><span class="summary-amount">KM '+fmt(pair[1])+'</span>';
    cont.appendChild(row);
  });
  var tot=document.createElement('div'); tot.className='summary-row';
  tot.innerHTML='<div class="summary-left"><span class="summary-icon">sum</span><div><div class="summary-name" style="font-weight:600">Ukupno</div></div></div><span class="summary-amount" style="color:var(--accent)">KM '+fmt(total)+'</span>';
  cont.appendChild(tot);
}

document.getElementById('btn-open-summary').onclick=function(){document.getElementById('summary-modal').classList.add('open');};
document.getElementById('btn-close-summary').onclick=function(){document.getElementById('summary-modal').classList.remove('open');};
document.getElementById('btn-close-report').onclick=function(){document.getElementById('report-modal').classList.remove('open');};

document.getElementById('btn-report').onclick=async function(){
  var data=loadData().filter(function(e){
    var d=new Date(e.date+'T00:00:00');
    return d.getFullYear()===viewYear&&d.getMonth()===viewMonth;
  });
  if(!data.length){showToast('Nema troskova za ovaj mjesec!');return;}
  document.getElementById('report-modal').classList.add('open');
  document.getElementById('report-loading').style.display='flex';
  document.getElementById('report-content').style.display='none';
  document.getElementById('report-month-title').textContent=SR_MONTHS[viewMonth]+' '+viewYear;
  document.getElementById('btn-report').disabled=true;
  var bycat={};
  data.forEach(function(e){bycat[e.cat]=(bycat[e.cat]||0)+e.amt;});
  var total=data.reduce(function(s,e){return s+e.amt;},0);
  var days=new Set(data.map(function(e){return e.date;})).size;
  var catBreakdown=Object.entries(bycat).sort(function(a,b){return b[1]-a[1];}).map(function(pair){
    var cat=CATS.find(function(c){return c.id===pair[0];})||{name:pair[0]};
    return '- '+cat.name+': KM '+pair[1].toFixed(2)+' ('+Math.round(pair[1]/total*100)+'%)';
  }).join('\n');
  var prompt='Analiziraj moje troskove za '+SR_MONTHS[viewMonth]+' '+viewYear+' na srpskom.\n\nUkupno: KM '+total.toFixed(2)+'\nDana: '+days+'\nProsjek/dan: KM '+(total/days).toFixed(2)+'\n\nPo kategorijama:\n'+catBreakdown+'\n\nNapravi izvjestaj sa TACNO ovim naslovima (pisanim velikim slovima):\n\nSAZETAK MJESECA\n[2-3 recenice]\n\nKLJUCNI UVIDI\n[3 uvida koji pocinju sa -]\n\nSAVJETI ZA SLJEDECI MJESEC\n1. ...\n2. ...\n3. ...\n\nOCJENA MJESECA\n[Ocjena 1-10 sa obrazlozenjem]\n\nBudi direktan i konkretan.';
  try{
    var resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    var json=await resp.json();
    var raw=(json.content&&json.content[0]&&json.content[0].text)?json.content[0].text:'';
    renderReport(raw,total,days,bycat);
  }catch(err){
    document.getElementById('report-loading').style.display='none';
    document.getElementById('report-content').style.display='block';
    document.getElementById('report-content').innerHTML='<div class="report-error">Greska pri povezivanju.<br>'+err.message+'</div>';
  }
  document.getElementById('btn-report').disabled=false;
};

function renderReport(raw,total,days,bycat){
  document.getElementById('report-loading').style.display='none';
  var cont=document.getElementById('report-content'); cont.style.display='block'; cont.innerHTML='';
  var topCat=Object.entries(bycat).sort(function(a,b){return b[1]-a[1];})[0];
  var topName=(CATS.find(function(c){return c.id===topCat[0];})||{name:topCat[0]}).name;
  cont.innerHTML+='<div class="report-section"><div class="report-section-title">Brojke</div><div class="report-stat-row"><span class="report-stat-label">Ukupno</span><span class="report-stat-val">KM '+total.toFixed(2)+'</span></div><div class="report-stat-row"><span class="report-stat-label">Prosjek/dan</span><span class="report-stat-val">KM '+(total/days).toFixed(2)+'</span></div><div class="report-stat-row"><span class="report-stat-label">Najveca kategorija</span><span class="report-stat-val">'+topName+' - KM '+topCat[1].toFixed(2)+'</span></div></div>';
  var sections=[
    {key:'SAZETAK MJESECA',style:'text'},
    {key:'KLJUCNI UVIDI',style:'text'},
    {key:'SAVJETI ZA SLJEDECI MJESEC',style:'advice'},
    {key:'OCJENA MJESECA',style:'text'}
  ];
  sections.forEach(function(sec,idx){
    var si=raw.indexOf(sec.key); if(si===-1)return;
    var after=raw.slice(si+sec.key.length).trim();
    var nk=idx<sections.length-1?sections[idx+1].key:null;
    var content=nk&&after.indexOf(nk)!==-1?after.slice(0,after.indexOf(nk)).trim():after.trim();
    if(!content)return;
    var h='<div class="report-section"><div class="report-section-title">'+sec.key+'</div>';
    if(sec.style==='advice'){
      content.split('\n').forEach(function(line){
        var m=line.trim().match(/^(\d+)\.\s*(.*)/);
        if(m)h+='<div class="report-advice-item"><span class="advice-num">'+m[1]+'.</span><span class="advice-text">'+m[2]+'</span></div>';
      });
    }else{
      h+='<div class="report-text">';
      content.split('\n').filter(function(l){return l.trim();}).forEach(function(l){h+='<div>'+l+'</div>';});
      h+='</div>';
    }
    h+='</div>'; cont.innerHTML+=h;
  });
}

var toastT;
function showToast(msg){
  var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(function(){t.classList.remove('show');},2000);
}

buildCatGrid(); buildMonthNav(); setTodayDate(); render();

document.getElementById('inp-amount').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('inp-desc').focus();});
document.getElementById('inp-desc').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('btn-add').click();});
</script>
